[app]
data_dir = "data"
default_language = "en"
timezone = "America/Chicago"
enable_cleanup = false
enable_article = false
yt_dlp_binary = "yt-dlp"
yt_dlp_timeout_seconds = 120
fetch_retries = 2
retry_backoff_seconds = 2
max_videos_per_channel = 40

[llm]
provider = "openrouter"
model = "openai/gpt-4.1-mini"
prompt_version = "v1"
timeout_seconds = 60
retries = 2
retry_backoff_seconds = 2

